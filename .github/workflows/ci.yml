name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Validate all JavaScript syntax
        run: npm run syntax

      - name: Run deterministic automated tests
        run: npm run test

      - name: Build container image
        run: docker build --tag api-status-pulse:ci .
