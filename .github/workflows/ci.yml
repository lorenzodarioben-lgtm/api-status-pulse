name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Validate JavaScript syntax
        run: npm run syntax

      - name: Run automated tests
        run: npm run test

      - name: Run health monitor
        run: npm run start

      - name: Build Docker image
        run: docker build -t api-status-pulse .